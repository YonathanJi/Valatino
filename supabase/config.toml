project_id = "valatino"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[realtime]
enabled = true
ip_version = "IPv4"

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback", "https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true

[auth.email.smtp]
enabled = true
host = "smtp.sendgrid.net"
port = 465
user = "apikey"
pass = "env(SENDGRID_API_KEY)"
admin_email = "jonathanduqee@gmail.com"
sender_name = "Valatino"

[auth.email.template.magic_link]
subject = "Tu código de acceso a Valatino"
content_path = "./supabase/templates/magic_link.html"

[auth.email.template.confirmation]
subject = "Confirma tu email en Valatino"
content_path = "./supabase/templates/confirmation.html"

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326
